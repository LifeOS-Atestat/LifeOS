<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiecte & Task-uri - LifeOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            align-items: start;
            margin-top: 1rem;
        }

        .kanban-column {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 1.25rem;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        body.light-mode .kanban-column {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .kanban-column:hover {
            border-color: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        body.light-mode .kanban-column:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .task-card {
            background: var(--card);
            border-radius: 1.25rem;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: grab;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            position: relative;
            color: var(--text);
        }

        body.light-mode .task-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .column-header h3 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .task-count {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        body.light-mode .task-count {
            background: rgba(0, 0, 0, 0.05);
        }

        .task-card:active { cursor: grabbing; }

        .task-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .priority-badge {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .priority-high { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .priority-medium { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .priority-low { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            justify-content: flex-end;
        }

        .task-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .task-actions button:hover { opacity: 1; color: var(--text); }
        .btn-delete:hover { color: var(--danger) !important; }

        .drag-over {
            background: rgba(99, 102, 241, 0.1) !important;
            border-color: var(--primary) !important;
        }

        @media (max-width: 1024px) {
            .kanban-board { grid-template-columns: 1fr; }
            .kanban-column { min-height: 200px; }
        }
    </style>
</head>
<body class="app-page">
    <nav class="sidebar"></nav>

    <main class="main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2 style="margin: 0;">Proiecte & Task-uri</h2>
                <p style="color: var(--text-muted); margin: 0.25rem 0 0 0; font-size: 0.9rem;">Gestionează-ți ideile printr-un sistem Kanban intuitiv.</p>
            </div>
            <button onclick="openModal('taskModal')" class="btn-primary">➕ Task Nou</button>
        </header>

        <div style="margin-top: 1.5rem; display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem;">
            <div style="flex: 1; position: relative;">
                <input type="text" id="taskSearch" placeholder="Caută task..." 
                    oninput="filterTasks()"
                    style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; transition: border-color 0.2s;">
                <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.5;">🔍</span>
            </div>
        </div>

        <div class="kanban-board">
            <!-- To Do -->
            <div class="kanban-column" id="col-todo" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="column-header">
                    <h3>🎯 De făcut <span class="task-count" id="count-todo">0</span></h3>
                </div>
                <div class="tasks-container" id="container-todo"></div>
            </div>

            <!-- In Progress -->
            <div class="kanban-column" id="col-in-progress" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="column-header">
                    <h3>⚡ În lucru <span class="task-count" id="count-in-progress">0</span></h3>
                </div>
                <div class="tasks-container" id="container-in-progress"></div>
            </div>

            <!-- Done -->
            <div class="kanban-column" id="col-done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="column-header">
                    <h3>✅ Finalizat <span class="task-count" id="count-done">0</span></h3>
                </div>
                <div class="tasks-container" id="container-done"></div>
            </div>
        </div>
    </main>

    <!-- Modal Adaugă Task -->
    <div id="taskModal" class="modal">
        <div class="card" style="max-width: 450px; width: 95%;">
            <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem;">Adaugă un Task Nou</h3>
            
            <div class="form-group">
                <label>Titlu Task</label>
                <input type="text" id="taskTitle" placeholder="ex: Refactorizare modul login">
            </div>

            <div class="form-group">
                <label>Descriere (Opțional)</label>
                <textarea id="taskDesc" rows="3" style="resize: none;" placeholder="Ce trebuie făcut mai exact?"></textarea>
            </div>

            <div class="form-group">
                <label>Prioritate</label>
                <select id="taskPriority">
                    <option value="low">Răbdător (Scăzută)</option>
                    <option value="medium" selected>Normal</option>
                    <option value="high">Urgent (Ridicată)</option>
                </select>
            </div>

            <div style="display: flex; gap: 0.75rem; margin-top: 1rem;">
                <button onclick="saveTask()" class="btn-primary" style="flex: 2;">Salvează Task</button>
                <button onclick="closeModal('taskModal')" class="btn-secondary" style="flex: 1;">Anulează</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
    <script>
        // Init Kanban
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initTasks === 'function') initTasks();
        });

        // Drag and Drop Helpers
        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function dragLeave(ev) {
            ev.currentTarget.classList.remove('drag-over');
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.classList.add('dragging');
        }

        function drop(ev) {
            ev.preventDefault();
            const column = ev.currentTarget;
            column.classList.remove('drag-over');
            
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            draggedElement.classList.remove('dragging');
            
            const newStatus = column.id.replace('col-', '');
            const taskId = data.replace('task-', '');
            
            // Move item visually
            column.querySelector('.tasks-container').appendChild(draggedElement);
            
            // Update in DB via app.js function
            if (typeof updateTaskStatus === 'function') {
                updateTaskStatus(taskId, newStatus);
            }
        }
    </script>
</body>
</html>
