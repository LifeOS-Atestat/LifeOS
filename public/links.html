<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkuri Utile - LifeOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>

<body class="app-page">
    <nav class="sidebar"></nav>

    <main class="main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2>Linkuri Utile 🔗</h2>
                <p style="color: #94a3b8; margin-top: 0.25rem;">Colecția ta de resurse și scurtături preferate.</p>
            </div>
            <button class="btn-primary" onclick="openModal('linkModal')">
                <span>➕</span> Adaugă Link
            </button>
        </header>

        <div id="linksList" class="links-grid">
            <!-- Link cards will be rendered here -->
            <div class="empty-state">
                <span class="empty-icon">⏳</span>
                <p>Se încarcă linkurile tale...</p>
            </div>
        </div>
    </main>

    <!-- Modal Adăugare Link -->
    <div id="linkModal" class="modal">
        <div class="card" style="max-width: 500px; width: 95%;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="margin: 0; font-size: 1.25rem;">Adaugă un link nou</h3>
                <span class="close" onclick="closeModal('linkModal')" style="cursor: pointer; font-size: 1.5rem; opacity: 0.6;">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Titlu Link</label>
                    <input type="text" id="linkTitle" placeholder="Ex: ChatGPT, Google Docs...">
                </div>
                <div class="form-group">
                    <label>URL (Link)</label>
                    <input type="url" id="linkUrl" placeholder="https://example.com">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Categorie</label>
                        <select id="linkCategory">
                            <option value="General">General</option>
                            <option value="Muncă">Muncă</option>
                            <option value="Educație">Educație</option>
                            <option value="Divertisment">Divertisment</option>
                            <option value="Utilități">Utilități</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Iconiță (Emoji)</label>
                        <input type="text" id="linkIcon" value="🔗" style="text-align: center;">
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 0.75rem; margin-top: 1rem;">
                <button class="btn-primary" onclick="saveLink()" style="flex: 2;">Salvează Link</button>
                <button class="btn-secondary" onclick="closeModal('linkModal')" style="flex: 1;">Anulează</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
    <script>
        // Init logic for this page
        document.addEventListener('DOMContentLoaded', () => {
            initLinks();
        });
    </script>
</body>

</html>
