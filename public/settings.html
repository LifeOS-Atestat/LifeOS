<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setări - LifeOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>

<body class="app-page">
    <nav class="sidebar"></nav>

    <main class="main">
        <header>
            <h2>Setări</h2>
        </header>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;">
                <div style="position: relative;">
                    <div id="settingsAvatarPreview" class="avatar"
                        style="width: 80px; height: 80px; font-size: 2.5rem; border: 2px solid var(--primary);">U</div>
                    <img id="settingsAvatarImg" src="" alt="Avatar"
                        style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); display: none;">
                </div>
                <div>
                    <h3 style="margin-bottom: 0.25rem;">Poză de Profil</h3>
                    <p style="color: #94a3b8; font-size: 0.9rem;">Încarcă o imagine (JPG, PNG) de maxim 5MB.</p>
                </div>
            </div>

            <form id="avatarForm">
                <input type="file" name="avatar" id="avatarInput" accept="image/*" style="display: none;"
                    onchange="previewAvatar(this)">
                <div style="display: flex; gap: 1rem;">
                    <button type="button" class="btn-secondary"
                        onclick="document.getElementById('avatarInput').click()">📂 Alege Fișier</button>
                    <button type="submit" class="btn-primary" id="btnUpload" disabled>💾 Salvează</button>
                </div>
            </form>
            <div id="uploadStatus" style="margin-top: 1rem; font-size: 0.9rem;"></div>
        </div>

        <div class="card" style="text-align: center; padding: 2rem; margin-top: 2rem; opacity: 0.7;">
            <div style="font-size: 2rem; margin-bottom: 0.5rem;">🚧</div>
            <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;">Alte Setări</h3>
            <p style="color: #94a3b8;">Mai multe opțiuni vor apărea aici în curând.</p>
        </div>
    </main>
    <script src="/app.js"></script>
</body>

</html>
