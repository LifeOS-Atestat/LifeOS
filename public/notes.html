<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note - LifeOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        .notes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            align-items: start;
        }
        @media (min-width: 600px) {
            .notes-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }
        .note-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            transition: var(--transition);
        }
        body.light-mode .note-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .note-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .note-content {
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text);
            opacity: 0.9;
            white-space: pre-wrap;
        }
        .note-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 0.75rem;
        }
        body.light-mode .note-date {
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
        .color-picker {
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid rgba(255,255,255,0.1) !important;
        }
        .color-picker:hover {
            transform: scale(1.2);
        }
        .color-picker.active {
            transform: scale(1.3);
            border-color: white !important;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
    </style>
</head>

<body class="app-page">
    <nav class="sidebar"></nav>

    <main class="main">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2>Note și Jurnal 📝</h2>
                <div id="dateDisplay" style="color: #94a3b8; margin-top: 0.25rem;"></div>
            </div>
            <button onclick="openModal('noteModal')" class="btn-primary">➕ Notă Nouă</button>
        </header>

        <div style="margin-top: 1.5rem; display: flex; gap: 1rem; align-items: center;">
            <div style="flex: 1; position: relative;">
                <input type="text" id="noteSearch" placeholder="Caută în note (titlu sau conținut)..." 
                    oninput="filterNotes()"
                    style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; transition: border-color 0.2s;">
                <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.5;">🔍</span>
            </div>
        </div>

        <section style="margin-top: 2rem;">
            <div id="notesList" class="notes-grid">
                <div style="grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 3rem; font-style: italic;">
                    Se încarcă notele...
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Notă -->
    <div id="noteModal" class="modal">
        <div class="card" style="max-width: 500px; width: 95%;">
            <h3>Scrie o Notă</h3>
            
            <div class="form-group" style="margin-top: 1rem;">
                <label>Titlu (opțional)</label>
                <input type="text" id="noteTitle" placeholder="Titlul notei tale...">
            </div>
            
            <div class="form-group">
                <label>Conținut</label>
                <textarea id="noteContent" rows="8" placeholder="Scrie ceva inspirat..." style="resize: none;"></textarea>
            </div>

            <div class="form-group">
                <label>Culoare Fundal</label>
                <div id="colorContainer" style="display: flex; gap: 0.8rem; margin-top: 0.5rem;">
                    <button class="color-picker" onclick="setNoteColor('#ff7eb9', this)" style="width: 28px; height: 28px; border-radius: 50%; border: none; background: #ff7eb9; cursor: pointer;"></button>
                    <button class="color-picker" onclick="setNoteColor('#7afcff', this)" style="width: 28px; height: 28px; border-radius: 50%; border: none; background: #7afcff; cursor: pointer;"></button>
                    <button class="color-picker" onclick="setNoteColor('#feff9c', this)" style="width: 28px; height: 28px; border-radius: 50%; border: none; background: #feff9c; cursor: pointer;"></button>
                    <button class="color-picker active" onclick="setNoteColor('#ffffff', this)" style="width: 28px; height: 28px; border-radius: 50%; border: 2px solid #555; background: #ffffff; cursor: pointer;"></button>
                    <input type="hidden" id="noteColor" value="#ffffff">
                </div>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                <button onclick="saveNote()" class="btn-primary" style="flex: 1;">Salvează</button>
                <button onclick="closeModal('noteModal')" class="btn-secondary" style="flex: 1;">Anulează</button>
            </div>
        </div>
    </div>

    <!-- Clock Global -->
    <div id="clock" class="app-clock">00:00:00</div>

    <script src="/app.js"></script>
</body>

</html>
