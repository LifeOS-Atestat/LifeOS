<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economii - LifeOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        .savings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .goal-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.3s ease;
        }

        .goal-card:hover {
            transform: translateY(-5px);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .goal-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .goal-progress-bg {
            background: rgba(0, 0, 0, 0.3);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .goal-progress-fill {
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 6px;
        }

        .goal-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .goal-sum-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
            color: white;
            padding: 0.5rem;
            border-radius: 8px;
            width: 80px;
            outline: none;
        }
    </style>
</head>

<body class="app-page">
    <nav class="sidebar"></nav>

    <main class="main">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2>Obiective de Economisire 💎</h2>
                <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 0.25rem;">Pune bani deoparte pentru visele tale.</p>
            </div>
            <button onclick="openModal('goalModal')" class="btn-primary">➕ Obiectiv Nou</button>
        </header>

        <section style="margin-top: 2rem;">
            <div id="goalsList" class="savings-grid">
                <!-- Goals Dynamic -->
                <div style="grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 3rem;">
                    Se încarcă obiectivele...
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Obiectiv Nou -->
    <div id="goalModal" class="modal">
        <div class="card" style="max-width: 450px; width: 95%;">
            <h3>Planifică un Obiectiv</h3>
            <div class="form-group" style="margin-top: 1rem;">
                <label>Ce dorești să cumperi?</label>
                <input type="text" id="goalTitle" placeholder="ex: Laptop Gaming, Vacanță Grecia...">
            </div>
            <div class="form-group">
                <label>Suma Țintă (RON)</label>
                <input type="number" id="goalTarget" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Termen Limită (opțional)</label>
                <input type="date" id="goalDeadline">
            </div>
            <div class="form-group">
                <label>Culoare Identificativă</label>
                <input type="color" id="goalColor" value="#6366f1" style="height: 40px; border-radius: 8px;">
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                <button onclick="saveGoal()" class="btn-primary" style="flex: 1;">Creează Obiectiv</button>
                <button onclick="closeModal('goalModal')" class="btn-secondary" style="flex: 1;">Anulează</button>
            </div>
        </div>
    </div>

    <!-- Clock Global -->
    <div id="clock" class="app-clock">00:00:00</div>

    <script src="/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             initSavings();
        });
    </script>
</body>

</html>
